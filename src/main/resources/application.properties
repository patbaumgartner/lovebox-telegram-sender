# Infrastructure Settings
spring.threads.virtual.enabled=true
# Keep the JVM alive: this is a non-web app whose only foreground work is the
# Telegram long-polling loop. Under GraalVM native the polling threads are daemon
# threads, so without a keep-alive the process exits immediately after startup.
spring.main.keep-alive=true

# Application Settings
lovebox.enabled=true
logging.level.com.patbaumgartner=debug
logging.level.org.telegram.telegrambots=info

