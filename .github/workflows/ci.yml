name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  JAVA_VERSION: "25"
  MAVEN_OPTS: "-Xmx1024m -XX:+UseG1GC"

jobs:
  # ── Java / Spring Boot ──────────────────────────────────────────────────────
  java:
    name: Java – Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Check code formatting
        run: ./mvnw spring-javaformat:validate -ntp

      - name: Build, test & verify
        run: ./mvnw clean verify -ntp -Dmaven.test.failure.ignore=true
        env:
          MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: "Test Results – Java ${{ env.JAVA_VERSION }}"
          path: "target/surefire-reports/*.xml,target/failsafe-reports/TEST-*.xml"
          reporter: java-junit
          fail-on-error: true

  # ── Docker – Publish latest native image (push to main only) ────────────────
  docker:
    name: Docker – Publish latest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [java]
    # Publish only on direct pushes to main (or manual dispatch), never on PRs.
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Custom run image adds fonts required by java.awt image rendering; the
      # buildpack pulls it via runImage/pullPolicy=IF_NOT_PRESENT from pom.xml.
      - name: Build & push run image (latest)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.base-cnb
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lovebox-telegram-sender-run:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GraalVM native image via the Paketo native buildpack (-Pnative), published
      # straight to Docker Hub as :latest using the docker login credentials.
      - name: Build & publish native image (latest)
        run: |
          ./mvnw -B -ntp -Pnative spring-boot:build-image -DskipTests \
            -Dspring-boot.build-image.publish=true \
            -Dspring-boot.build-image.imageName=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/lovebox-telegram-sender:latest
        env:
          MAVEN_OPTS: ${{ env.MAVEN_OPTS }}

